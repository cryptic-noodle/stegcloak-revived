<svg viewBox="0 0 980 520" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
    <marker id="arrowAccent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a855f7"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="980" height="520" fill="#ffffff"/>

  <!-- Title -->
  <text x="490" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#111827">StegCloak Revived — how it works</text>

  <!-- ============ HIDE ROW (boxes vertically centered on y=140) ============ -->
  <text x="20" y="86" font-size="13" font-weight="700" fill="#a855f7" letter-spacing="1">HIDE</text>

  <!-- 1. Secret -->
  <rect x="20" y="105" width="130" height="70" rx="10" fill="#f5f3ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="85" y="135" text-anchor="middle" font-size="12.5" font-weight="600" fill="#4c1d95">Secret text</text>
  <text x="85" y="152" text-anchor="middle" font-size="10.5" fill="#6b21a8">your message</text>

  <line x1="150" y1="140" x2="184" y2="140" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 2. Compress -->
  <rect x="188" y="105" width="140" height="70" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="258" y="128" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1e3a8a">Compress</text>
  <text x="258" y="145" text-anchor="middle" font-size="10.5" fill="#1e40af">zstd (level 19)</text>
  <text x="258" y="160" text-anchor="middle" font-size="9.5" fill="#64748b">skipped if it doesn't shrink</text>

  <line x1="328" y1="140" x2="362" y2="140" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 3. Encrypt (taller box, centered on same y=140) -->
  <rect x="366" y="90" width="200" height="100" rx="10" fill="#fdf2f8" stroke="#ec4899" stroke-width="1.5"/>
  <text x="466" y="113" text-anchor="middle" font-size="12.5" font-weight="600" fill="#831843">Encrypt (optional)</text>
  <text x="466" y="131" text-anchor="middle" font-size="10.5" fill="#9d174d">Argon2id key derivation</text>
  <text x="466" y="147" text-anchor="middle" font-size="10.5" fill="#9d174d">XChaCha20-Poly1305 AEAD</text>
  <text x="466" y="164" text-anchor="middle" font-size="9.5" fill="#64748b">+ commitment tag (anti-tamper)</text>

  <line x1="566" y1="140" x2="600" y2="140" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 4. Base-6 encode -->
  <rect x="604" y="105" width="150" height="70" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="1.5"/>
  <text x="679" y="128" text-anchor="middle" font-size="12.5" font-weight="600" fill="#713f12">Base-6 encode</text>
  <text x="679" y="145" text-anchor="middle" font-size="10.5" fill="#854d0e">6 zero-width Unicode</text>
  <text x="679" y="160" text-anchor="middle" font-size="9.5" fill="#64748b">chars, invisible stream</text>

  <line x1="754" y1="140" x2="788" y2="140" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 5. Embed -->
  <rect x="792" y="105" width="150" height="70" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="867" y="135" text-anchor="middle" font-size="12.5" font-weight="600" fill="#14532d">Embed in</text>
  <text x="867" y="152" text-anchor="middle" font-size="10.5" fill="#166534">cover text</text>

  <!-- output text bar, centered under the whole row -->
  <line x1="867" y1="175" x2="867" y2="205" stroke="#a855f7" stroke-width="2"/>
  <line x1="490" y1="205" x2="867" y2="205" stroke="#a855f7" stroke-width="2"/>
  <line x1="490" y1="205" x2="490" y2="228" stroke="#a855f7" stroke-width="2" marker-end="url(#arrowAccent)"/>
  <rect x="150" y="232" width="680" height="42" rx="8" fill="#111827"/>
  <text x="490" y="258" text-anchor="middle" font-size="11.5" fill="#e5e7eb" font-family="Consolas, monospace">"The WiFi's not working here!" — looks identical, secret hidden invisibly inside</text>

  <!-- divider -->
  <line x1="20" y1="300" x2="960" y2="300" stroke="#e5e7eb" stroke-width="1"/>

  <!-- ============ REVEAL ROW (boxes vertically centered on y=380) ============ -->
  <text x="20" y="330" font-size="13" font-weight="700" fill="#a855f7" letter-spacing="1">REVEAL</text>

  <!-- connector from output bar down into the reveal row, aligned to box 1's center -->
  <line x1="490" y1="274" x2="490" y2="290" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="150" y1="290" x2="490" y2="290" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="150" y1="290" x2="150" y2="343" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- 1. cloaked text -->
  <rect x="20" y="345" width="150" height="70" rx="10" fill="#111827"/>
  <text x="95" y="374" text-anchor="middle" font-size="11.5" fill="#e5e7eb" font-family="Consolas, monospace">cloaked text</text>
  <text x="95" y="391" text-anchor="middle" font-size="9.5" fill="#9ca3af">(what you pasted)</text>

  <line x1="170" y1="380" x2="204" y2="380" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 2. detach + decode -->
  <rect x="208" y="345" width="160" height="70" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="1.5"/>
  <text x="288" y="368" text-anchor="middle" font-size="12.5" font-weight="600" fill="#713f12">Detach &amp; decode</text>
  <text x="288" y="385" text-anchor="middle" font-size="10.5" fill="#854d0e">extract ZWC stream,</text>
  <text x="288" y="400" text-anchor="middle" font-size="10.5" fill="#854d0e">base-6 → bytes</text>

  <line x1="368" y1="380" x2="402" y2="380" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 3. verify + decrypt (taller box, centered on same y=380) -->
  <rect x="406" y="330" width="220" height="100" rx="10" fill="#fdf2f8" stroke="#ec4899" stroke-width="1.5"/>
  <text x="516" y="353" text-anchor="middle" font-size="12.5" font-weight="600" fill="#831843">Verify &amp; decrypt</text>
  <text x="516" y="371" text-anchor="middle" font-size="10.5" fill="#9d174d">check commitment tag,</text>
  <text x="516" y="387" text-anchor="middle" font-size="10.5" fill="#9d174d">Argon2id + XChaCha20-Poly1305</text>
  <text x="516" y="404" text-anchor="middle" font-size="9.5" fill="#64748b">(only if payload was encrypted)</text>

  <line x1="626" y1="380" x2="660" y2="380" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 4. decompress -->
  <rect x="664" y="345" width="130" height="70" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="729" y="375" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1e3a8a">Decompress</text>
  <text x="729" y="392" text-anchor="middle" font-size="10.5" fill="#1e40af">zstd</text>

  <line x1="794" y1="380" x2="828" y2="380" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 5. secret recovered -->
  <rect x="832" y="345" width="128" height="70" rx="10" fill="#f5f3ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="896" y="375" text-anchor="middle" font-size="12.5" font-weight="600" fill="#4c1d95">Secret text</text>
  <text x="896" y="392" text-anchor="middle" font-size="10.5" fill="#6b21a8">recovered</text>

  <!-- footer note -->
  <text x="490" y="465" text-anchor="middle" font-size="11.5" fill="#6b7280">Version + flag bytes in the payload record whether compression/encryption were used, so reveal auto-detects both.</text>
  <text x="490" y="485" text-anchor="middle" font-size="11.5" fill="#6b7280">Everything above runs entirely client-side — no server ever sees the secret, password, or cover text.</text>
</svg>
